services:
  - type: web
    name: mtproto-uploader
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn mtproto_uploader.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
